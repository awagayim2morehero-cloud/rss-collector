name: RSS Daily Collector

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate config.py from Secrets
        run: |
          {
            echo "import os"
            echo "from keywords import INTEREST_KEYWORDS"
            echo ""
            echo "EMAIL_ADDRESS     = os.environ.get('EMAIL_ADDRESS')"
            echo "EMAIL_PASSWORD    = os.environ.get('EMAIL_PASSWORD')"
            echo "EMAIL_TO          = os.environ.get('EMAIL_TO')"
            echo "ANTHROPIC_API_KEY = os.environ.get('ANTHROPIC_API_KEY')"
            echo "FEEDBACK_URL      = os.environ.get('FEEDBACK_URL', '')"
          } > config.py

      - name: Run RSS collector
        run: python fetch_rss.py
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FEEDBACK_URL: ${{ secrets.FEEDBACK_URL }}

      - name: Save seen_articles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_articles.json
          git diff --staged --quiet || git commit -m "chore: update seen_articles [skip ci]"
          git push
